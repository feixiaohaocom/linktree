    text-decoration: none;

  }
  .socials a:hover { transform: translateY(-1px); opacity: 0.85; }
  .socials img { width: 24px; height: 24px; }

  .links {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .link {

    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 24px;
    background: var(--btn-bg);
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    border-radius: 9999px;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.02);
  }
  .link:hover {
    transform: scale(1.015);
    box-shadow: 0 6px 18px var(--ring);
  }
  .link .icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
  }
  .link .icon img { width: 22px; height: 22px; }
  .link .label {

    text-align: center;
    line-height: 1.3;
  }

  footer {

    font-size: 12px;

    opacity: 0.7;
    text-align: center;
  }
  footer a { color: inherit; text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 420px) {
